    drop_pose1_joint3_rad: 0.0            # 0 deg
    drop_pose1_joint4_rad: 1.6929693744   # 97 deg
    drop_pose2_joint1_rad: -2.3911010752  # -137 deg
    drop_pose2_joint2_rad: 0.5410520681   # 31 deg
    drop_pose2_joint3_rad: -0.6457718232  # -37 deg
