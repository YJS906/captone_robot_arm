detect_color_object:
  ros__parameters:
    color_topic: /camera/color/image_raw
    depth_topic: /camera/depth/image_raw
    camera_info_topic: /camera/depth/camera_info
    output_frame: link1
    target_pose_topic: /vision/target_pose
    marker_topic: /vision/target_marker
    debug_image_topic: /vision/debug_image
    min_depth_m: 0.05
    max_depth_m: 0.60
    min_area_px: 500.0
    sample_radius_px: 25
    # Red wraps around the OpenCV HSV hue range, so lower hue > upper hue means
    # detect [lower_h, 179] OR [0, upper_h].
    hsv_lower: [170, 70, 50]
    hsv_upper: [12, 255, 255]
    target_orientation_xyzw: [0.0, 0.0, 0.0, 1.0]
    # Shape filter to accept rectangular / cuboid contours only
    shape_filter_enabled: true
    min_aspect_ratio: 0.70
    max_aspect_ratio: 1.45
    min_extent: 0.50
    max_extent: 1.0
    min_solidity: 0.80
    max_solidity: 1.0
    min_corner_count: 4
    max_corner_count: 8
    pose_filter_enabled: true
    pose_filter_window_size: 7
    pose_filter_min_samples: 5
    pose_filter_max_spread_m: 0.015

detect_depth_object:
  ros__parameters:
    depth_topic: /camera/depth/image_raw
    camera_info_topic: /camera/depth/camera_info
    output_frame: link1
    target_pose_topic: /vision/target_pose
    marker_topic: /vision/target_marker
    debug_image_topic: /vision/debug_image
    min_depth_m: 0.12
    max_depth_m: 0.20
    closest_band_m: 0.04
    min_area_px: 300.0
    shape_filter_enabled: true
    min_aspect_ratio: 0.5
    max_aspect_ratio: 3.0
    min_extent: 0.30
    max_extent: 1.0
    min_solidity: 0.70
    max_solidity: 1.0
    min_bottom_to_top_width_ratio: 0.6
    max_bottom_to_top_width_ratio: 1.80
    min_width_profile_samples: 8
    sample_radius_px: 5
    roi_x: 0
    roi_y: 0
    roi_width: -1
    roi_height: -1
    target_orientation_xyzw: [0.0, 0.0, 0.0, 1.0]

